<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mad Libs</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f5f5f5;
      padding: 30px;
    }

    h1 {
      color: #333;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background-color: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    #historia {
      margin-top: 20px;
      font-size: 18px;
      color: #222;
      background: white;
      padding: 15px;
      border-radius: 10px;
      display: inline-block;
      max-width: 500px;
    }
  </style>

</head>
<body>

  <h1>Mad Libs 🎭</h1>
  <p>Preencha as 10 palavras:</p>

  <input id="p1" placeholder="Adjetivo"><br>
  <input id="p2" placeholder="Substantivo"><br>
  <input id="p3" placeholder="Verbo"><br>
  <input id="p4" placeholder="Lugar"><br>
  <input id="p5" placeholder="Nome"><br>
  <input id="p6" placeholder="Animal"><br>
  <input id="p7" placeholder="Cor"><br>
  <input id="p8" placeholder="Objeto"><br>
  <input id="p9" placeholder="Comida"><br>
  <input id="p10" placeholder="Emoção"><br><br>

  <button onclick="gerarHistoria()">GO</button>

  <div id="historia"></div>

  <script>
    function gerarHistoria() {

      let p1 = document.getElementById("p1").value;
      let p2 = document.getElementById("p2").value;
      let p3 = document.getElementById("p3").value;
      let p4 = document.getElementById("p4").value;
      let p5 = document.getElementById("p5").value;
      let p6 = document.getElementById("p6").value;
      let p7 = document.getElementById("p7").value;
      let p8 = document.getElementById("p8").value;
      let p9 = document.getElementById("p9").value;
      let p10 = document.getElementById("p10").value;

      let historia = `
      Era uma vez um(a) ${p1} ${p2} que adorava ${p3} em ${p4}.
      Um dia, ${p5} encontrou um(a) ${p7} ${p6} com um(a) ${p8}.
      Eles comeram ${p9} juntos e se sentiram muito ${p10}!
      `;

      document.getElementById("historia").innerText = historia;
    }
  </script>

</body>
</html>
